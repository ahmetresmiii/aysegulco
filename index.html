<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşegül Coşkun | Dijital Evren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;900&family=Outfit:wght@200;400;700&display=swap');
        :root { --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .font-brand { font-family: 'Unbounded', sans-serif; }
        .glow { position: fixed; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(100,100,255,0.08) 0%, transparent 70%); border-radius: 50%; z-index: -1; filter: blur(80px); }
        .premium-card { background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(10,10,10,0.9)); border: 1px solid var(--border); border-radius: 40px; backdrop-filter: blur(20px); transition: 0.3s ease; }
        .cemile-chat { background: #000; border: 1px solid #222; border-radius: 30px; }
        .bubble { padding: 12px 18px; border-radius: 20px; font-size: 14px; max-width: 85%; }
        .bubble-bot { background: #fff; color: #000; border-bottom-left-radius: 4px; }
        .bubble-user { background: #222; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .admin-trigger { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: #fff; color: #000; border-radius: 24px; display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; border-radius: 15px !important; padding: 15px !important; }
        .hidden-panel { display: none !important; }
    </style>
</head>
<body>
    <div class="glow" style="top: -10%; left: -10%;"></div>
    
    <nav class="fixed top-0 w-full z-50 py-8 px-12 flex justify-between items-center mix-blend-difference">
        <h1 class="font-brand text-xs uppercase tracking-[0.4em] font-black">Ayşegül Coşkun</h1>
        <div class="flex gap-10 text-[10px] uppercase tracking-widest font-bold">
            <button onclick="setView('grid')" class="hover:opacity-50">Koleksiyon</button>
            <button onclick="setView('blog')" class="hover:opacity-50">Anlatı</button>
        </div>
    </nav>

    <header class="pt-52 pb-32 px-6 flex flex-col items-center text-center">
        <img id="profile-img" src="https://ui-avatars.com/api/?name=A+C&background=fff&color=000" class="w-48 h-48 rounded-full border-4 border-white grayscale mb-12 shadow-2xl">
        <h2 id="profile-name" class="font-brand text-5xl md:text-7xl mb-6 tracking-tighter lowercase">aysegulco2</h2>
        <p id="profile-bio" class="text-gray-400 max-w-xl text-lg font-light leading-relaxed italic">Yükleniyor...</p>
        <div class="flex gap-20 mt-16">
            <div class="text-center"><span id="stat-posts" class="block text-3xl font-brand">0</span><span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Post</span></div>
            <div class="text-center"><span id="stat-followers" class="block text-3xl font-brand">0</span><span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Takipçi</span></div>
            <div class="text-center"><span id="stat-following" class="block text-3xl font-brand">0</span><span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Takip</span></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-10 pb-60">
        <div id="grid-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <div id="blog-view" class="hidden-panel max-w-4xl mx-auto space-y-40"></div>
    </main>

    <div class="admin-trigger" onclick="openAdmin()"><i class="fa-solid fa-terminal text-xl"></i></div>

    <div id="admin-modal" class="hidden-panel fixed inset-0 z-[2000] bg-black/98 backdrop-blur-2xl flex items-center justify-center p-4">
        <div class="w-full max-w-6xl h-[85vh] flex flex-col premium-card overflow-hidden">
            <!-- Login Section -->
            <div id="auth-box" class="flex-1 flex flex-col items-center justify-center p-10">
                <h3 class="font-brand text-xl mb-8 tracking-widest">SİSTEM ERİŞİMİ</h3>
                <input type="password" id="auth-pass" class="text-center text-4xl w-72 mb-6 tracking-widest" placeholder="••••">
                <button id="login-btn" onclick="checkAuth()" class="bg-white text-black px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest active:scale-90 transition">Sisteme Gir</button>
                <button onclick="closeAdmin()" class="mt-8 text-gray-600 text-[10px] uppercase font-bold tracking-widest">İptal</button>
            </div>

            <!-- Management Section -->
            <div id="panel-box" class="hidden-panel flex-1 flex flex-col overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center bg-zinc-900/50">
                    <span class="font-brand text-[9px] tracking-[0.3em] uppercase opacity-50">Kontrol Merkezi v4.2 FIX</span>
                    <button onclick="closeAdmin()"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div class="flex-1 overflow-y-auto p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                        <div class="lg:col-span-4 space-y-10">
                            <div class="space-y-4">
                                <h4 class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">PROFİL</h4>
                                <input type="text" id="up-name" placeholder="Username">
                                <textarea id="up-bio" class="h-24 w-full" placeholder="Bio..."></textarea>
                                <button onclick="pushProfile()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Güncelle</button>
                            </div>
                            <div class="space-y-4 border-t border-white/5 pt-10">
                                <h4 class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">POST</h4>
                                <input type="text" id="up-url" placeholder="URL (p/XYZ...)">
                                <textarea id="up-desc" class="h-32 w-full" placeholder="Açıklama..."></textarea>
                                <button onclick="pushPost()" class="w-full bg-white text-black py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Yayınla</button>
                            </div>
                        </div>
                        <div class="lg:col-span-8 flex flex-col h-[600px] cemile-chat">
                            <div id="ai-messages" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>
                            <div class="p-6 bg-zinc-900/30 flex gap-2">
                                <input type="text" id="ai-input" placeholder="Cemile'ye yaz..." class="flex-1 !mb-0" onkeypress="if(event.key === 'Enter') talkToCemile()">
                                <button onclick="talkToCemile()" class="w-14 bg-white text-black rounded-xl"><i class="fa-solid fa-bolt"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'aysegul-render-pro';

        let isAdmin = false;
        let globalPosts = [];

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else { await auth.signInAnonymously(); }
                
                db.collection(`artifacts/${appId}/public/data/profile`).doc('main').onSnapshot(doc => {
                    if(doc.exists) {
                        const d = doc.data();
                        if(d.name) document.getElementById('profile-name').innerText = d.name;
                        if(d.bio) document.getElementById('profile-bio').innerText = d.bio;
                        document.getElementById('stat-followers').innerText = d.followers || 0;
                        document.getElementById('stat-following').innerText = d.following || 0;
                    }
                });

                db.collection(`artifacts/${appId}/public/data/posts`).orderBy('timestamp', 'desc').onSnapshot(snap => {
                    globalPosts = [];
                    snap.forEach(doc => globalPosts.push({id: doc.id, ...doc.data()}));
                    document.getElementById('stat-posts').innerText = globalPosts.length;
                    render();
                });
            } catch (err) { console.error(err); }
        }

        // Şifre Giriş Fonksiyonu (Daha Direct)
        function checkAuth() {
            const input = document.getElementById('auth-pass');
            const boxAuth = document.getElementById('auth-box');
            const boxPanel = document.getElementById('panel-box');
            
            if(input.value.trim().toUpperCase() === 'AC2026') {
                isAdmin = true;
                boxAuth.classList.add('hidden-panel');
                boxPanel.classList.remove('hidden-panel');
                render();
            } else {
                alert("Hatalı Şifre!");
                input.value = "";
            }
        }

        function render() {
            const grid = document.getElementById('grid-view');
            const blog = document.getElementById('blog-view');
            if(!grid) return;
            
            grid.innerHTML = ''; blog.innerHTML = '';

            globalPosts.forEach(p => {
                let clean = p.url.replace('https://www.instagram.com', '').split('?')[0];
                if(!clean.endsWith('/')) clean += '/';
                const embedUrl = `https://www.instagram.com${clean}embed`;

                grid.innerHTML += `
                    <div class="premium-card p-4 flex flex-col">
                        <div class="aspect-[4/5] rounded-[30px] overflow-hidden bg-zinc-900">
                            <iframe src="${embedUrl}" class="w-full h-full border-none" scrolling="no"></iframe>
                        </div>
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <p class="text-[11px] text-gray-500 italic mb-4">${p.description || ''}</p>
                            <div class="flex justify-between items-center border-t border-white/5 pt-4">
                                <span class="text-[7px] text-white/20 uppercase">ID: ${p.id.slice(-4)}</span>
                                ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="text-red-500 text-[9px] font-black">SİL</button>` : ''}
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function talkToCemile() {
            const input = document.getElementById('ai-input');
            const box = document.getElementById('ai-messages');
            if(!input.value) return;
            box.innerHTML += `<div class="bubble bubble-user">${input.value}</div>`;
            const userPrompt = input.value;
            input.value = "";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Kısa ve cool bir instagram açıklaması yaz: ${userPrompt}` }] }] })
                });
                const data = await res.json();
                box.innerHTML += `<div class="bubble bubble-bot">${data.candidates[0].content.parts[0].text}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch(e) { console.error(e); }
        }

        async function pushPost() {
            const url = document.getElementById('up-url').value;
            const desc = document.getElementById('up-desc').value;
            if(!url) return;
            await db.collection(`artifacts/${appId}/public/data/posts`).add({
                url, description: desc, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Başarıyla eklendi!");
        }

        async function pushProfile() {
            await db.collection(`artifacts/${appId}/public/data/profile`).doc('main').set({
                name: document.getElementById('up-name').value,
                bio: document.getElementById('up-bio').value
            }, {merge: true});
            alert("Profil güncellendi!");
        }

        async function deletePost(id) { if(confirm("Emin misin?")) await db.collection(`artifacts/${appId}/public/data/posts`).doc(id).delete(); }
        function openAdmin() { document.getElementById('admin-modal').classList.remove('hidden-panel'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden-panel'); }
        function setView(v) {
            document.getElementById('grid-view').classList.toggle('hidden-panel', v !== 'grid');
            document.getElementById('blog-view').classList.toggle('hidden-panel', v !== 'blog');
        }

        window.onload = init;
    </script>
</body>
</html>
