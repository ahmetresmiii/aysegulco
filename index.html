<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşegül Coşkun | Dijital Evren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;900&family=Outfit:wght@200;400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; margin: 0; }
        .font-brand { font-family: 'Unbounded', sans-serif; }
        .premium-card { background: rgba(15,15,15,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; backdrop-filter: blur(10px); }
        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #fff; color: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; border-radius: 12px !important; padding: 12px !important; width: 100%; }
        iframe { border-radius: 20px; }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="fixed top-0 w-full z-50 py-6 px-10 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <h1 class="font-brand text-[10px] uppercase tracking-[0.3em]">Ayşegül Coşkun</h1>
        <div class="flex gap-6 text-[10px] font-bold uppercase">
            <button onclick="location.reload()">Yenile</button>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-40 pb-20 px-6 text-center">
        <h2 id="profile-name" class="font-brand text-4xl md:text-6xl mb-4 lowercase">aysegulco2</h2>
        <p id="profile-bio" class="text-gray-500 italic max-w-lg mx-auto italic">Yükleniyor...</p>
    </header>

    <!-- Feed -->
    <main class="max-w-6xl mx-auto px-6 pb-40">
        <div id="grid-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- Admin Panel -->
    <div class="admin-trigger" onclick="toggleModal(true)"><i class="fa-solid fa-code"></i></div>

    <div id="admin-modal" style="display:none;" class="fixed inset-0 z-[2000] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-4xl premium-card overflow-hidden flex flex-col max-h-[90vh]">
            <!-- Login -->
            <div id="auth-section" class="p-20 text-center">
                <h3 class="font-brand text-sm mb-6 uppercase">Admin Erişimi</h3>
                <input type="password" id="admin-pass" class="text-center text-2xl mb-6" placeholder="Şifre">
                <button onclick="handleLogin()" class="bg-white text-black px-10 py-3 rounded-full font-bold uppercase text-xs">Giriş Yap</button>
                <button onclick="toggleModal(false)" class="block mx-auto mt-6 text-gray-500 text-xs uppercase">Kapat</button>
            </div>

            <!-- Panel -->
            <div id="panel-section" style="display:none;" class="flex-1 overflow-y-auto p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <h4 class="font-brand text-[10px] text-gray-400 uppercase">Profil Ayarları</h4>
                        <input type="text" id="in-name" placeholder="İsim">
                        <textarea id="in-bio" placeholder="Biyografi"></textarea>
                        <button onclick="saveProfile()" class="bg-indigo-600 w-full py-3 rounded-xl font-bold text-xs uppercase">Profili Kaydet</button>
                    </div>
                    <div class="space-y-4">
                        <h4 class="font-brand text-[10px] text-gray-400 uppercase">Yeni Paylaşım</h4>
                        <input type="text" id="in-url" placeholder="Instagram URL (p/...)">
                        <textarea id="in-desc" placeholder="Post Açıklaması"></textarea>
                        <button onclick="savePost()" class="bg-white text-black w-full py-3 rounded-xl font-bold text-xs uppercase">Paylaş</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Yapılandırma
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'aysegul_ultimate_v1'; 

        let userReady = false;
        let isAdmin = false;

        async function init() {
            try {
                // KURAL: Önce Auth, sonra Firestore
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                
                userReady = true;
                startListeners();
            } catch (e) { 
                console.error("Auth hatası:", e); 
            }
        }

        function startListeners() {
            if(!userReady) return;

            // Profil Verisi - KURAL 1: Tam yol kullanımı
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profile').doc('main')
                .onSnapshot(doc => {
                    if(doc.exists) {
                        const d = doc.data();
                        document.getElementById('profile-name').innerText = d.name || 'aysegulco2';
                        document.getElementById('profile-bio').innerText = d.bio || '';
                        document.getElementById('in-name').value = d.name || '';
                        document.getElementById('in-bio').value = d.bio || '';
                    }
                }, err => console.error("Profil dinleme hatası:", err));

            // Postlar - KURAL 1: Tam yol kullanımı
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('posts')
                .onSnapshot(snap => {
                    const grid = document.getElementById('grid-view');
                    grid.innerHTML = '';
                    // Not: orderBy() bazen index gerektirdiği için JS tarafında sıralama yapıyoruz (Kural 2)
                    let posts = [];
                    snap.forEach(doc => posts.push({id: doc.id, ...doc.data()}));
                    
                    posts.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                    posts.forEach(p => {
                        let igUrl = p.url;
                        if(!igUrl.includes('instagram.com')) igUrl = `https://www.instagram.com/p/${igUrl.replace(/\//g, '')}/`;
                        const embed = igUrl.split('?')[0] + 'embed';

                        grid.innerHTML += `
                            <div class="premium-card p-4 space-y-4">
                                <div class="overflow-hidden rounded-[20px] bg-zinc-900 aspect-[4/5]">
                                    <iframe src="${embed}" class="w-full h-full border-none" scrolling="no"></iframe>
                                </div>
                                <p class="text-xs text-gray-400 px-2 italic">${p.description || ''}</p>
                                ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="text-[9px] text-red-500 font-bold uppercase p-2">SİL</button>` : ''}
                            </div>
                        `;
                    });
                }, err => console.error("Post dinleme hatası:", err));
        }

        function handleLogin() {
            const p = document.getElementById('admin-pass').value.trim().toUpperCase();
            if(p === 'AC2026') {
                isAdmin = true;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('panel-section').style.display = 'block';
                startListeners(); // Admin butonlarını göstermek için tekrar çiz
            } else { 
                alert("Hatalı!"); 
            }
        }

        async function saveProfile() {
            if(!userReady) return;
            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('profile').doc('main').set({
                    name: document.getElementById('in-name').value,
                    bio: document.getElementById('in-bio').value
                }, {merge: true});
                alert("Güncellendi!");
            } catch(e) { console.error(e); }
        }

        async function savePost() {
            const url = document.getElementById('in-url').value;
            if(!url || !userReady) return;
            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('posts').add({
                    url: url,
                    description: document.getElementById('in-desc').value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('in-url').value = '';
                document.getElementById('in-desc').value = '';
                alert("Yayınlandı!");
            } catch(e) { console.error(e); }
        }

        async function deletePost(id) {
            if(confirm("Silmek istediğine emin misin?")) {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('posts').doc(id).delete();
            }
        }

        function toggleModal(show) {
            document.getElementById('admin-modal').style.display = show ? 'flex' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
